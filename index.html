<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>ModelViewerを使ったWebARページ</title>
    <style>
      /* ARボタンのサイズを大きくする */
      model-viewer::part(ar-button) {
        width: 200px;        /* 幅を大きく */
        height: 60px;        /* 高さを大きく */
        font-size: 20px;     /* 文字サイズを大きく */
        padding: 15px 30px;  /* パディングを追加 */
      }
      
      /* ボタンが表示されている位置を調整（必要なら） */
      model-viewer::part(ar-button-container) {
        bottom: 30px;  /* 下端からの距離 */
        right: 30px;   /* 右端からの距離 */
      }
    </style>
  </head>
  <body>
    <script 
        type="module"
        src="https://unpkg.com/@google/model-viewer/dist/model-viewer.js">
    </script>
      
    <model-viewer  
      ar
      alt="Leoモデル"
      src="mouse-a.glb" 
      ios-src="mouse-a.usdz" 
      style="width:800px;height:1000px;"                  
      background-color="#70BCD1"
      shadow-intensity="0.7"
      camera-controls
      interaction-prompt="auto"
      auto-rotate 
      ar 
      magic-leap>
    </model-viewer>
  </body>
</html>
